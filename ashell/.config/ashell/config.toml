[window_title]
mode = "Title"
truncate_title_after_length = 50

[system_info]
indicators = [ "Temperature" ]

[clock]
format = "%a w%W ยท %d %b ยท %R"

[tempo]
clock_format = "%a %x %R"
formats = [
    "%R",
    "%a w%W",
    "%d %b",
]
weather_location = "Current"
weather_indicator = "Icon"


[appearance]
font_name = "SUSE"
scale_factor = 1.2
opacity = 0.9
# menu.opacity = 0.9

# primary_color = "#7aa2f7"
success_color = "#9ece6a"
# text_color = "#a9b1d6"
