enable_esc_key = true
position = "Top"
# layer = "Overlay"

[modules]
# left = [ "Workspaces", "WindowTitle" ]
left = [ "Workspaces" ]
# left = [  ]
center = [ ]
# center = [ "Clock" ]
right = [ "MediaPlayer", "Tray", "SystemInfo", [ "Tempo" ], [ "Privacy", "Settings" ] ]

